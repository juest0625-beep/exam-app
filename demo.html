  <div class="q">1. 圖（一）為方糖投入水中的過程示意圖，其中乙到丙的過程與下列何種情形最類似？</div>
  <div class="opt correct">（A）在客廳聞到廚房飄來的飯菜味 ✅<div class="rationale">乙到丙是方糖分子從高濃度往低濃度擴散至整杯水，與香味分子在空氣中擴散原理相同，皆為擴散作用。</div></div><div class="opt">（B）使用吸管可吸取杯內下方的水 <div class="rationale">吸管吸水是利用大氣壓力差，並非分子的擴散現象。</div></div><div class="opt">（C）二氧化碳降溫加壓可製成乾冰 <div class="rationale">這是物質狀態變化（氣態→固態的凝華），屬於物理相變，無關擴散。</div></div><div class="opt">（D）純金項鍊長久維持原來的色澤 <div class="rationale">金的化學性質穩定，不易氧化或與其他物質反應，屬於化學惰性，與擴散無關。</div></div>
